<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal Cliente – Crédito Boricua</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#003087;--blue2:#001f5c;--blue3:#1a4db5;--blue-light:#e8eef8;
      --green:#0a7c59;--green-light:#e6f4f0;
      --red:#c0392b;--red-light:#fdecea;
      --gray:#64748b;--border:#dde3ef;--white:#fff;--bg:#f0f4fb;--text:#1a2340;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* ── SCREENS ── */
    .screen{display:none!important}
    .screen.on{display:block!important}
    #auth.on{display:flex!important}

    /* ── AUTH ── */
    #auth{
      min-height:100vh;
      background:linear-gradient(160deg,var(--blue2) 0%,var(--blue) 55%,var(--blue3) 100%);
      align-items:center;justify-content:center;padding:24px;
    }
    .abox{
      background:#fff;border-radius:20px;padding:38px 34px;
      width:100%;max-width:430px;box-shadow:0 20px 60px rgba(0,0,48,.3);
    }
    .alogo{text-align:center;margin-bottom:22px}
    .alogo img{height:64px;width:auto}
    .tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:24px}
    .tab{flex:1;padding:10px;text-align:center;font-weight:600;font-size:.88rem;cursor:pointer;color:var(--gray);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
    .tab.on{color:var(--blue);border-bottom-color:var(--blue)}
    .aform{display:none}
    .aform.on{display:block}
    .aform h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--blue);margin-bottom:3px}
    .aform .sub{font-size:.82rem;color:var(--gray);margin-bottom:20px}
    .fld{margin-bottom:14px}
    .fld label{display:block;font-size:.73rem;font-weight:700;color:var(--blue);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
    .fld input,.fld select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:.91rem;font-family:'Inter',sans-serif;color:var(--text);background:#f8faff;outline:none;transition:border-color .2s,box-shadow .2s}
    .fld input:focus,.fld select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,48,135,.08);background:#fff}
    .abtn{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:9px;font-size:.97rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:background .2s;margin-top:6px}
    .abtn:hover{background:var(--blue2)}
    .aerr{display:none;color:var(--red);font-size:.8rem;text-align:center;margin-top:10px;padding:8px 12px;background:var(--red-light);border-radius:7px}

    /* ── DASHBOARD ── */
    #dash{min-height:100vh}
    .dnav{background:var(--blue);height:64px;padding:0 4%;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,48,.2);position:sticky;top:0;z-index:50}
    .dnav img{height:44px;width:auto}
    .dnav-r{display:flex;align-items:center;gap:10px}
    .ubadge{background:rgba(255,255,255,.15);color:#fff;font-size:.79rem;font-weight:600;padding:6px 13px;border-radius:20px}
    .lbtn{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 13px;border-radius:7px;font-size:.79rem;font-weight:600;cursor:pointer;transition:background .2s}
    .lbtn:hover{background:rgba(255,255,255,.2)}

    .dlayout{display:flex;min-height:calc(100vh - 64px)}
    .sidebar{width:210px;background:var(--blue2);padding:22px 0;flex-shrink:0}
    .sitem{display:flex;align-items:center;gap:10px;padding:12px 20px;color:rgba(255,255,255,.7);font-size:.86rem;font-weight:500;cursor:pointer;transition:all .2s;border-left:3px solid transparent}
    .sitem:hover{background:rgba(255,255,255,.07);color:#fff}
    .sitem.on{background:rgba(255,255,255,.13);color:#fff;border-left-color:#fff;font-weight:700}

    .dcontent{flex:1;padding:28px 4%;overflow-x:hidden}
    .panel{display:none}
    .panel.on{display:block}
    .ptitle{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--blue);margin-bottom:22px}

    /* WELCOME BANNER */
    .wbanner{background:linear-gradient(135deg,var(--blue) 0%,var(--blue3) 100%);border-radius:16px;padding:24px 26px;margin-bottom:20px;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
    .wbanner h2{font-family:'Playfair Display',serif;font-size:1.35rem;margin-bottom:4px}
    .wbanner p{font-size:.83rem;color:rgba(255,255,255,.8)}
    .wbadge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:12px;padding:14px 20px;text-align:center;min-width:140px}
    .wnum{font-size:1.55rem;font-weight:800}
    .wlbl{font-size:.69rem;color:rgba(255,255,255,.75);margin-top:3px}

    /* CARDS */
    .crow{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:18px}
    .card{background:#fff;border-radius:14px;padding:20px 18px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04)}
    .cico{font-size:1.4rem;margin-bottom:8px}
    .clbl{font-size:.68rem;font-weight:700;color:var(--gray);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
    .cval{font-size:1.55rem;font-weight:800;color:var(--blue)}
    .cval.g{color:var(--green)}
    .cval.r{color:var(--red)}
    .cval.na{font-size:1rem;color:var(--gray)}
    .csub{font-size:.74rem;color:var(--gray);margin-top:3px}

    /* PROGRESS */
    .pbg{background:var(--blue-light);border-radius:8px;height:10px;overflow:hidden;margin-top:8px}
    .pfill{background:var(--green);height:10px;border-radius:8px;transition:width .8s ease}

    /* TABLE */
    .tcard{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
    .thead{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .thead h3{font-size:.96rem;font-weight:700;color:var(--blue)}
    table{width:100%;border-collapse:collapse}
    th{background:#f4f7fd;padding:10px 15px;text-align:left;font-size:.68rem;font-weight:700;color:var(--gray);letter-spacing:.8px;text-transform:uppercase}
    td{padding:12px 15px;font-size:.85rem;border-top:1px solid var(--border)}
    tr:hover td{background:#fafbff}
    .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.69rem;font-weight:700}
    .bg{background:var(--green-light);color:var(--green)}
    .bb{background:var(--blue-light);color:var(--blue)}
    .by{background:#fff6e0;color:#a86a00}
    .brj{background:var(--red-light);color:var(--red)}
    .empty-msg{text-align:center;padding:32px;color:var(--gray);font-size:.9rem}

    /* RECEIPT */
    .receipt-card{background:var(--green-light);border:1px solid #bfe3d4;border-radius:16px;padding:28px 26px;box-shadow:0 4px 16px rgba(10,124,89,.08);animation:receiptIn .45s ease;max-width:520px}
    @keyframes receiptIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .receipt-icon{width:52px;height:52px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 12px;animation:checkPop .5s cubic-bezier(.34,1.56,.64,1)}
    @keyframes checkPop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.12);opacity:1}100%{transform:scale(1)}}
    .receipt-title{text-align:center;font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--green);margin-bottom:4px}
    .receipt-sub{text-align:center;font-size:.8rem;color:var(--gray);margin-bottom:20px}
    .receipt-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #cfe9dd;font-size:.85rem}
    .receipt-row:last-child{border-bottom:none}
    .receipt-row span:first-child{color:var(--gray);font-weight:500}
    .receipt-row span:last-child{font-weight:700;color:var(--text)}
    @media(max-width:600px){.receipt-card{padding:22px 18px}}

    /* DISBURSEMENT STEPS */
    .ds-step{display:flex;align-items:center;gap:9px;font-size:.85rem;color:var(--gray)}
    .ds-step.done{color:var(--green);font-weight:600}
    .ds-step.active{color:var(--blue);font-weight:600}

    /* NOTIFICATIONS */
    .notif-item{display:flex;gap:10px;padding:13px 20px;border-top:1px solid var(--border);font-size:.85rem;align-items:flex-start}
    .notif-item:first-child{border-top:none}
    .notif-time{font-size:.71rem;color:var(--gray);margin-top:2px}

    /* MOBILE HISTORY CARDS */
    .hist-table-wrap{display:block}
    .hist-cards-wrap{display:none}
    .hist-card{background:#fafbff;border:1px solid var(--border);border-radius:10px;padding:13px 15px}
    .hist-card-row{display:flex;justify-content:space-between;font-size:.83rem;padding:3px 0}
    .hist-card-row span:first-child{color:var(--gray)}
    .hist-card-row span:last-child{font-weight:600;text-align:right}
    @media(max-width:600px){
      .hist-table-wrap{display:none}
      .hist-cards-wrap{display:flex;flex-direction:column;gap:10px;padding:14px}
    }

    /* SIMULATOR */
    .scard{background:#fff;border-radius:14px;padding:26px;border:1px solid var(--border);max-width:560px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
    .scard h3{font-size:.97rem;font-weight:700;color:var(--blue);margin-bottom:18px}
    .sfld{margin-bottom:14px}
    .sfld label{display:block;font-size:.72rem;font-weight:700;color:var(--blue);margin-bottom:4px;text-transform:uppercase}
    .sfld input,.sfld select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:'Inter',sans-serif;outline:none;background:#f8faff;transition:border-color .2s}
    .sfld input:focus,.sfld select:focus{border-color:var(--blue);background:#fff}
    .sbtn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:.92rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;margin-top:4px}
    .sbtn:hover{background:var(--blue2)}
    .sres{margin-top:18px;padding:18px;background:var(--blue-light);border-radius:12px;border:1px solid #c7d4f8;display:none}
    .sres h4{font-size:.75rem;font-weight:700;color:var(--blue);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
    .srow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #dde3ef;font-size:.85rem}
    .srow:last-child{border-bottom:none;font-weight:700;color:var(--blue);font-size:.9rem}

    /* BANK INFO BLOCK */
    .bank-block{background:#f8faff;border:1px solid var(--border);border-radius:12px;padding:18px 18px 6px;margin-bottom:18px}
    .bank-block h4{font-size:.78rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.4px;margin-bottom:14px}
    .tr-err{display:none;color:var(--red);font-size:.82rem;margin-top:2px;margin-bottom:14px;padding:10px 14px;background:var(--red-light);border-radius:8px;font-weight:600}
    .tr-success{display:none;color:var(--green);font-size:.85rem;margin-top:2px;margin-bottom:14px;padding:12px 14px;background:var(--green-light);border-radius:8px;font-weight:600}
    .fld-hint{font-size:.71rem;color:var(--gray);margin-top:3px}

    /* PROFILE */
    .pcrd{background:#fff;border-radius:14px;padding:26px;border:1px solid var(--border);max-width:500px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
    .pavatar{width:66px;height:66px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.7rem;color:#fff;margin-bottom:18px;font-weight:700}
    .prow{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);font-size:.87rem}
    .prow:last-child{border-bottom:none}
    .prow span:first-child{color:var(--gray);font-weight:500}
    .prow span:last-child{font-weight:600}

    @media(max-width:600px){
      .sidebar{display:none}
      .dcontent{padding:18px 4%}
      .crow{grid-template-columns:1fr 1fr}
      .wbanner{flex-direction:column}
      .abox{padding:28px 20px}
    }

    /* ── ADMIN ── */
    #adminAuth{min-height:100vh;background:linear-gradient(160deg,var(--blue2) 0%,var(--blue) 55%,var(--blue3) 100%);align-items:center;justify-content:center;padding:24px}
    #adminAuth.on{display:flex!important}
    .admin-link{display:block;text-align:center;margin-top:16px;font-size:.8rem;color:rgba(255,255,255,.85);cursor:pointer;text-decoration:underline}
    .adm-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .adm-input{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.82rem;font-family:'Inter',sans-serif;background:#f8faff;outline:none}
    .adm-input:focus{border-color:var(--blue);background:#fff}
    .adm-btn-outline{background:#fff;border:1.5px solid var(--blue);color:var(--blue);padding:8px 13px;border-radius:8px;font-size:.79rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s}
    .adm-btn-outline:hover{background:var(--blue-light)}
    .adm-btn-outline.green{border-color:var(--green);color:var(--green)}
    .adm-btn-outline.green:hover{background:var(--green-light)}
    .adm-modal{display:none;position:fixed;inset:0;background:rgba(0,20,60,.55);z-index:100;align-items:center;justify-content:center;padding:20px}
    .adm-modal.on{display:flex}
    .adm-modal-card{background:#fff;border-radius:16px;padding:28px;max-width:460px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,48,.3)}
    @media(max-width:600px){
      .adm-toolbar{width:100%}
      .adm-input{flex:1;min-width:0}
    }

    /* ── PIPELINE TRACKER ── */
    .tstep{display:flex;gap:12px;align-items:flex-start;padding:9px 0}
    .tstep .tdot{width:26px;height:26px;border-radius:50%;background:var(--border);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.76rem;flex-shrink:0;font-weight:700}
    .tstep.done .tdot{background:var(--green)}
    .tstep.active .tdot{background:var(--blue)}
    .tstep.rejected .tdot{background:var(--red)}
    .tstep .tlbl{font-size:.87rem;font-weight:600;color:var(--text)}
    .tstep.done .tlbl{color:var(--green)}
    .tstep.active .tlbl{color:var(--blue)}
    .tstep.rejected .tlbl{color:var(--red)}
    .tstep .tsub{font-size:.72rem;color:var(--gray);margin-top:1px}

    /* ── CONTRATO / DOCUMENTOS ── */
    .contract-box{max-height:340px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;padding:18px;font-size:.83rem;line-height:1.65;background:#f8faff;white-space:pre-wrap}
    .locked-card{text-align:center;padding:40px 20px;color:var(--gray)}
    .locked-card .lico{font-size:2rem;margin-bottom:10px}
    .doc-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:.83rem;gap:8px;flex-wrap:wrap}
    .doc-row:last-child{border-bottom:none}
    .doc-actions button{margin-left:6px}
    .proto-note{font-size:.68rem;color:var(--gray);text-align:center;margin-top:18px;opacity:.8}

    /* ── ADMIN TABS ── */
    .admtabs{display:flex;gap:8px;margin-bottom:20px}
    .admtab{padding:9px 18px;border-radius:9px;font-size:.85rem;font-weight:700;cursor:pointer;background:#fff;border:1.5px solid var(--border);color:var(--gray)}
    .admtab.on{background:var(--blue);border-color:var(--blue);color:#fff}
  </style>
</head>
